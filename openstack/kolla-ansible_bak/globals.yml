---
# Kolla-Ansible Global Configuration
# Multinode OpenStack with OVN and External Ceph

# =============================================================================
# Basic OpenStack Configuration
# =============================================================================
kolla_base_distro: "ubuntu"
kolla_install_type: "source"
openstack_release: "2023.2"

# =============================================================================
# Network Configuration
# =============================================================================
kolla_internal_vip_address: "10.8.132.98"
kolla_external_vip_address: "10.8.132.226"

# Network interfaces
network_interface: "br-mgmt"
api_interface: "br-api"
storage_interface: "br-mgmt"
cluster_interface: "br-mgmt"
tunnel_interface: "br-mgmt"
neutron_external_interface: "br-provider"

# Enable VIP management
enable_haproxy: "yes"

# =============================================================================
# Database and Message Queue
# =============================================================================
enable_mariadb: "yes"
enable_rabbitmq: "yes"

# =============================================================================
# OpenStack Core Services
# =============================================================================
enable_glance: "yes"
enable_nova: "yes"
enable_neutron: "yes"
enable_horizon: "yes"
enable_keystone: "yes"

# =============================================================================
# Neutron Configuration (OVN)
# =============================================================================
neutron_plugin_agent: "ovn"
enable_neutron_ovn_agent: "yes"
enable_neutron_dvr: "no"
enable_neutron_provider_networks: "yes"
neutron_type_drivers: "flat,vlan,vxlan"
neutron_tenant_network_types: "vlan,vxlan"
neutron_network_vlan_ranges: "physnet1:3410:3410"
neutron_external_vlan_ranges: "physnet1:3411:3411"
neutron_bridge_name: "br-provider"
neutron_physical_network_name: "physnet1"

# OVN Configuration
enable_ovn: "yes"
ovn_nb_connection: "tcp:{{ kolla_internal_vip_address }}:6641"
ovn_sb_connection: "tcp:{{ kolla_internal_vip_address }}:6642"

# =============================================================================
# External Ceph Configuration
# =============================================================================
enable_ceph: "no"
enable_ceph_external: "yes"

# Ceph External Configuration
ceph_external_mon_hosts: |
  {% for host in groups['ceph-mon'] %}
  - {{ hostvars[host]['ansible_' + hostvars[host]['api_interface']]['ipv4']['address'] }}:6789
  {% endfor %}

# Ceph Authentication
ceph_admin_keyring: "AQDxxxxxxxxxxxxxxxxxxxxxxxxxxxxx=="  # Replace with actual key
ceph_cinder_keyring: "AQDxxxxxxxxxxxxxxxxxxxxxxxxxxxxx=="   # Replace with actual key
ceph_glance_keyring: "AQDxxxxxxxxxxxxxxxxxxxxxxxxxxxxx=="   # Replace with actual key
ceph_nova_keyring: "AQDxxxxxxxxxxxxxxxxxxxxxxxxxxxxx=="    # Replace with actual key

# Ceph Pools
ceph_cinder_pool_name: "volumes"
ceph_cinder_backup_pool_name: "backups"
ceph_glance_pool_name: "images"
ceph_nova_pool_name: "vms"

# Ceph Configuration File
ceph_conf_file: |
  [global]
  fsid = xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Replace with actual FSID
  mon_initial_members = controller01,controller02,controller03
  mon_host = 10.8.132.100,10.8.132.101,10.8.132.102
  auth_cluster_required = cephx
  auth_service_required = cephx
  auth_client_required = cephx
  public_network = 10.8.132.160/27
  cluster_network = 10.8.132.128/27

# =============================================================================
# Cinder Configuration (External Ceph)
# =============================================================================
enable_cinder: "yes"
enable_cinder_backup: "yes"
cinder_backend_ceph: "yes"
cinder_volume_group: "cinder-volumes"

# =============================================================================
# Glance Configuration (External Ceph)
# =============================================================================
glance_backend_ceph: "yes"

# =============================================================================
# Nova Configuration (External Ceph)
# =============================================================================
nova_backend_ceph: "yes"
nova_compute_virt_type: "kvm"

# =============================================================================
# Additional Services
# =============================================================================
enable_heat: "yes"
enable_magnum: "no"
enable_ironic: "no"
enable_swift: "no"
enable_barbican: "no"
enable_manila: "no"

# =============================================================================
# Monitoring and Logging
# =============================================================================
enable_prometheus: "no"
enable_grafana: "no"
enable_elasticsearch: "no"
enable_kibana: "no"
enable_central_logging: "no"

# =============================================================================
# Time Synchronization
# =============================================================================
enable_chrony: "yes"

# =============================================================================
# Security Configuration
# =============================================================================
kolla_sshd_control_address: "{{ kolla_internal_vip_address }}"
kolla_sshd_allowed_addresses: "0.0.0.0/0"

# =============================================================================
# Docker Configuration
# =============================================================================
docker_registry: ""
docker_namespace: "kolla"

# =============================================================================
# Custom Configuration
# =============================================================================
custom_openstack_config: |
  [DEFAULT]
  debug = False
  
  [neutron]
  service_plugins = ovn-router
  
  [ovn]
  ovn_nb_connection = tcp:{{ kolla_internal_vip_address }}:6641
  ovn_sb_connection = tcp:{{ kolla_internal_vip_address }}:6642

# =============================================================================
# Inventory Groups Configuration
# =============================================================================
# Controllers (3 nodes)
# control: ctrl-01, ctrl-02, ctrl-03

# Compute + Ceph OSD nodes (3 nodes)  
# compute: comp-01, comp-02, comp-03
# storage: comp-01, comp-02, comp-03

# Network: All nodes
# network: ctrl-01, ctrl-02, ctrl-03, comp-01, comp-02, comp-03

# Monitoring: Controllers
# monitoring: ctrl-01, ctrl-02, ctrl-03
